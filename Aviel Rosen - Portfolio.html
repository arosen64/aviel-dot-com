document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

p>\n        <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n          <div class=\"mono\" style=\"font-size:12.5px; color:oklch(0.55 0.005 90);\">{{ p.stackLine }}<\u002Fdiv>\n          <a href=\"{{ p.link }}\" style=\"font-size:13px; color:oklch(0.4 0.005 90); text-decoration:underline; text-underline-offset:3px;\">View →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <sc-for list=\"{{ otherProjects }}\" as=\"p\" hint-placeholder-count=\"2\">\n      <div style=\"padding:22px 0; border-top:1px solid oklch(0.9 0.002 90);\">\n        <div style=\"font-size:17px; font-weight:600; color:#111; margin-bottom:2px;\">{{ p.title }}<\u002Fdiv>\n        <div style=\"font-size:14px; color:oklch(0.5 0.005 90); margin-bottom:10px;\">{{ p.tagline }}<\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.7; color:oklch(0.35 0.005 90); margin:0 0 10px;\">{{ p.summary }}<\u002Fp>\n        <a href=\"{{ p.link }}\" style=\"font-size:13px; color:oklch(0.4 0.005 90); text-decoration:underline; text-underline-offset:3px;\">View →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"padding:32px 0;\">\n    <div class=\"mono\" style=\"font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:oklch(0.55 0.01 90); margin-bottom:20px;\">Skills<\u002Fdiv>\n    <sc-for list=\"{{ skillGroups }}\" as=\"g\" hint-placeholder-count=\"5\">\n      <div style=\"font-size:14.5px; line-height:1.9; color:oklch(0.35 0.005 90);\"><span style=\"color:oklch(0.5 0.005 90);\">{{ g.label }}:<\u002Fspan> {{ g.items }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"padding:40px 0 0; border-top:1px solid oklch(0.9 0.002 90); font-size:13px; color:oklch(0.55 0.005 90);\">\n    avielrosen13@gmail.com\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const vals = this.buildVals();\n    vals.featured = vals.featured.map(p => ({ ...p, stackLine: p.stack.join(\", \"), link: p.link || \"#\" }));\n    vals.otherProjects = vals.otherProjects.map(p => ({ ...p, link: p.link || \"#\" }));\n    vals.experience = vals.experience.map(e => ({ ...e, bulletsLine: e.bullets.join(\" \") }));\n    return vals;\n  }\n  buildVals() {\n    return {\n      featured: [\n        {\n          title: \"Apollo\",\n          tagline: \"AI ecosystem for sports analytics, JHU Sports Analytics Research Group (Jan–Apr 2026)\",\n          imageLabel: \"[ architecture diagram ]\",\n          narrative: \"Apollo is an agent-driven intelligence hub that turns live sports data into actionable insight, built as a large team project with faculty Tad Berkery and Anton Dahbura. I owned the agent framework, the tool and agent registry infrastructure, and the evaluation harness across the full arc of the project. Early on, I built a Bluesky client library for data ingestion and the ToolRegistry from scratch, a system for registering Python functions as callable agent tools with annotation-driven runtime type checking, a discover() mechanism for startup module loading, and a 38-test suite validating registry behavior. I then shipped the team's first end-to-end agentic demo, InjuryAgent, a tool-use loop that queries player news and reasons over results with an LLM, along with an AgentTracer that logs tool calls and reasoning into inspectable session traces. As the framework generalized, I built the AgentRegistry to keep the growing roster of agents loosely coupled and retrievable by name, and an LLM-swap evaluation harness (seven incremental commits) with shared dataclasses, a BaselineCapture class, an LLM-based TestingEvaluatorAgent, and seven binary metric scorers, so the team could compare models on evidence instead of intuition. In the final phase, I consolidated six separate repositories into the apollo-monorepo, routed all agents through an AWS Application Load Balancer, and added auto-generation of OpenAPI-compatible tool schemas.\",\n          stack: [\"Python\", \"Agno\", \"AWS ALB\", \"OpenAPI\", \"RAG\"]\n        },\n        {\n          title: \"Timemaxx\",\n          tagline: \"AI-powered study scheduler, JHU Whiting School of Engineering (Jan–May 2026)\",\n          imageLabel: \"[ product screenshot ]\",\n          narrative: \"Timemaxx is a full-stack study planner built with a team of six that turns static due dates into an actionable, personalized schedule. It reads a student's syllabi, transcripts, and course list, estimates how long each assignment will actually take, and places study blocks directly onto their calendar at their most productive hours. I built the app end to end in React, TypeScript, and Convex, deployed via GitHub Actions to GitHub Pages. I integrated Google Gemini to estimate task completion time from parsed syllabi and transcripts, storing the model's reasoning traces alongside each estimate for auditability, and engineered the scheduling engine itself, which batches slot selection into a single Gemini call, writes study blocks to Convex, and auto-resolves Google Calendar conflicts. I also implemented Google Calendar OAuth, syllabus PDF parsing, and MAXX, a Mastra-based, RAG-backed chat assistant that lets students create tasks and log feedback in natural language from the dashboard. Under the hood, a retrieval-augmented pipeline retrieves each student's most similar past tasks and courses before Claude Sonnet 4 produces a time estimate, and a feedback loop of rated estimates versus actual time personalizes future predictions. Timemaxx was featured in the JHU Engineering Design Project Gallery and completed in May 2026.\",\n          stack: [\"React\", \"TypeScript\", \"Convex\", \"Mastra\", \"Claude Sonnet 4\"]\n        }\n      ],\n      experience: [\n        {\n          company: \"Wolfe Research — QES Team\",\n          dates: \"May 2026 – Aug 2026\",\n          role: \"Quantitative Researcher, QES\",\n          bullets: [\n            \"Leading the transition of the team's macroeconomic nowcasting indices from EViews to R, re-implementing the models in a modern, maintainable stack and optimizing the pipeline's efficiency and reproducibility.\",\n            \"Migrating a large portion of the program's workloads onto the cloud, and studying proprietary internal white papers authored by team lead Yin Luo to reconstruct the underlying methodology.\",\n            \"Implemented Principal Component Analysis and a state-space Kalman filter to construct the nowcasting indices from that methodology.\"\n          ]\n        },\n        {\n          company: \"Mindrian\",\n          dates: \"Oct 2025 – Feb 2026\",\n          role: \"Agent Development Intern\",\n          bullets: [\n            \"Designed and implemented an autonomous multi-agent document analysis system in Python using the Agno framework, supporting complex document lifecycle management and strategic analysis.\",\n            \"Engineered a hierarchical supervisor-worker architecture in which a central LLM agent orchestrates workflows and delegates deep reasoning to specialized sub-agents under a strict, secure delegation protocol.\",\n            \"Designed context pipelines that dynamically construct and evolve the system's AI understanding over time, and built MCP orchestration layers enabling multi-agent collaboration and feedback loops.\"\n          ]\n        },\n        {\n          company: \"Lakewood Capital Management\",\n          dates: \"May 2025 – Aug 2025\",\n          role: \"Analyst Intern, $3B+ Equity Hedge Fund\",\n          bullets: [\n            \"Completed an intensive training program covering advanced Excel-based financial modeling, Bloomberg Terminal analytics, and valuation frameworks for option pricing and discounted cash-flow analysis.\",\n            \"Built and automated Python scripts to web-scrape and aggregate data from the fast-casual restaurant space, reducing data-collection time by 90% and delivering actionable insights for market analysis.\"\n          ]\n        },\n        {\n          company: \"Rubric Capital\",\n          dates: \"Jun 2024 – Aug 2024\",\n          role: \"Analyst Intern, $3B+ Equity Hedge Fund\",\n          bullets: [\n            \"Engineered a market-neutral, Python-driven algorithmic trading strategy that identifies inflection points in consumer credit-card spending, which delivered consistent single-digit annualized returns backtested over a four-year period.\",\n            \"Conducted quantitative research on alternative credit and purchase data at scale, and researched potential short positions within the technology sector.\"\n          ]\n        }\n      ],\n      otherProjects: [\n        {\n          title: \"Order Book Matching Engine\",\n          tagline: \"C++17, market microstructure (2025)\",\n          summary: \"A trading core built in C++17 and the STL, supporting limit and market orders, automatic FIFO matching, partial fills, and order cancellation. I used maps, lists, and hash tables to keep best-price retrieval, FIFO matching, and order removal fast, and validated correctness with a comprehensive test suite covering full and partial fills, price-level exhaustion, and cancellation edge cases. GPT-4 and GitHub Copilot generated roughly 30% of the code.\"\n        },\n        {\n          title: \"AccessInvest\",\n          tagline: \"MorganHacks, Finalist, MongoDB award (Apr 2025)\",\n          summary: \"An AI-driven platform that turns complex financial data into actionable insight for new and underserved investors. Built at the MorganHacks hackathon, it aggregates and processes SEC filings (10-K, 10-Q, 8-K), real-time news, and multiple financial APIs, and integrates Google's Gemini API to perform sentiment analysis and interpretation of dense financial documents. The project was a hackathon finalist and received an award from MongoDB for exceptional use of their software.\"\n        },\n        {\n          title: \"Potlock\",\n          tagline: \"MorganHacks 2026, Winner, Best Use of Solana\",\n          summary: \"A Solana-based group treasury where money only moves when the group agrees, with governing rules defined in a formal contract before any funds can flow. Groups write their contract in plain English, which Gemini formalizes into a structured schema, then invite members by wallet address. Any member can propose a transaction, which is validated against the contract and reported to all members before a group-defined approval process (k-of-n, role-based, unanimous, or tiered) runs on-chain, executing funds immediately once the threshold is met. Built with Solana and Anchor for the on-chain treasury program, Convex for off-chain contract and transaction data, and React with a Phantom wallet integration on the frontend. The project won Best Use of Solana at MorganHacks 2026.\",\n          link: \"https://devpost.com/software/potlock\"\n        }\n      ],\n      skillGroups: [\n        { label: \"Languages\", items: \"Python, C++, Java, TypeScript, JavaScript\" },\n        { label: \"Frameworks\", items: \"React, Node.js, Agno, Mastra, PyTorch\" },\n        { label: \"Data & Tools\", items: \"Pandas, NumPy, SQL, Bloomberg, R\" },\n        { label: \"AI / Agents\", items: \"MCP, RAG, Claude Code, Cursor\" },\n        { label: \"Infra\", items: \"Git, GitHub Actions, Convex, AWS\" }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
